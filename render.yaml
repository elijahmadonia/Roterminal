services:
  - type: web
    name: roterminal
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:server
    healthCheckPath: /ready
    envVars:
      - key: NODE_VERSION
        value: 24.1.0
      - key: ROTERMINAL_SERVER_PORT
        value: 10000
      - key: ROTERMINAL_DATA_BACKEND
        value: memory
      - key: ROTERMINAL_SERVER_ENABLE_SCHEDULED_INGEST
        value: true
      - key: ROTERMINAL_INGEST_INTERVAL_MINUTES
        value: 5
      - key: ROTERMINAL_INGEST_STALE_AFTER_MS
        value: 1200000
      - key: ROTERMINAL_IMPORT_TOKEN
        sync: false
      - key: ROBLOX_SECURITY_COOKIE
        sync: false
      - key: ROBLOX_SECURITY_COOKIES
        sync: false
